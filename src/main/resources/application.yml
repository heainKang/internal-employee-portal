spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: false
    open-in-view: false
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Seoul

jwt:
  secret: ${JWT_SECRET_KEY}
  expiration: ${JWT_EXPIRATION:1800}

background-check:
  base-url: https://54capvm12g.execute-api.ap-northeast-2.amazonaws.com
  connect-timeout-ms: 3000
  read-timeout-ms: 10000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

app:
  admin:
    initial-email: ${ADMIN_INITIAL_EMAIL:admin@bit.com}
    initial-password: ${ADMIN_INITIAL_PASSWORD}

resilience4j:
  circuitbreaker:
    instances:
      # POST — 쓰기 작업: 실패 시 30s 차단 (중복 요청 방지)
      bgCheck-create:
        failure-rate-threshold: 50
        minimum-number-of-calls: 3
        sliding-window-size: 5
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 1
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        ignore-exceptions:
          - com.bit.portal.global.error.exception.BusinessException
      # GET 단건 — 읽기 작업: 20s 차단, 복구 탐침 2회
      bgCheck-get:
        failure-rate-threshold: 50
        minimum-number-of-calls: 3
        sliding-window-size: 5
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        ignore-exceptions:
          - com.bit.portal.global.error.exception.BusinessException
      # GET 목록 — 읽기 작업: 20s 차단, 복구 탐침 2회
      bgCheck-list:
        failure-rate-threshold: 50
        minimum-number-of-calls: 3
        sliding-window-size: 5
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        ignore-exceptions:
          - com.bit.portal.global.error.exception.BusinessException

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

logging:
  level:
    com.bit.portal: INFO
