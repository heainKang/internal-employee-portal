name: Build & Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.8
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Build JAR (테스트 제외)
        run: gradle bootJar -x test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Vue frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/app.jar"
          target: "/opt/portal/"
          strip_components: 2
          overwrite: true

      - name: Copy frontend dist to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend/dist/"
          target: "/opt/portal/frontend/"
          strip_components: 2
          overwrite: true

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo cp /opt/portal/../nginx/portal.conf /etc/nginx/sites-available/portal 2>/dev/null || \
            sudo bash -c 'cat > /etc/nginx/sites-available/portal' << 'NGINX'
            server {
                listen 80;
                server_name _;
                root /opt/portal/frontend;
                index index.html;
                location / { try_files $uri $uri/ /index.html; }
                location /api/ {
                    proxy_pass http://localhost:8080;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                }
                location /swagger-ui/ { proxy_pass http://localhost:8080; }
                location /v3/ { proxy_pass http://localhost:8080; }
            }
            NGINX
            sudo nginx -t && sudo systemctl reload nginx
            sudo systemctl restart portal
            sleep 5
            echo "=== Service Status ==="
            sudo systemctl status portal --no-pager | head -15
