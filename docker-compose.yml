services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: portal_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Local_Test1234!"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d portal_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Spring Boot App ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # ── Database ──────────────────────────────────────────
      DB_URL: "jdbc:postgresql://postgres:5432/portal_db"
      DB_USERNAME: postgres
      DB_PASSWORD: "Local_Test1234!"
      # ── JWT ───────────────────────────────────────────────
      # 로컬 개발 전용 키 — 프로덕션에서 절대 사용 금지
      JWT_SECRET_KEY: "local-dev-only-key-minimum-32chars-ok"
      JWT_EXPIRATION: "86400"
      # ── JPA ───────────────────────────────────────────────
      DDL_AUTO: update
      # ── Admin 초기 계정 ───────────────────────────────────
      ADMIN_INITIAL_EMAIL: "admin@bit.com"
      ADMIN_INITIAL_PASSWORD: "Admin1234!"
      # ── CORS ──────────────────────────────────────────────
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v3/api-docs > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
