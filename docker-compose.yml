services:

  # ── MSSQL (Azure SQL Edge — Apple Silicon arm64 네이티브) ─────────────────
  mssql:
    image: mcr.microsoft.com/azure-sql-edge:latest
    environment:
      ACCEPT_EULA: "1"
      MSSQL_SA_PASSWORD: "Local_Test1234!"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      # azure-sql-edge에 sqlcmd 없음 → bash TCP 소켓 체크로 대체
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/1433' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── DB 초기화 (portal_db 생성) ────────────────────────────────────────────
  # mssql/server:2022 이미지에 포함된 sqlcmd 사용 (Apple Silicon: Rosetta로 실행)
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    depends_on:
      mssql:
        condition: service_healthy
    volumes:
      - ./deploy/init-db.sh:/init-db.sh:ro
    entrypoint: ["/bin/bash", "/init-db.sh"]
    restart: "no"

  # ── Spring Boot App ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # ── Database ──────────────────────────────────────────
      DB_URL: "jdbc:sqlserver://mssql:1433;databaseName=portal_db;encrypt=false;trustServerCertificate=true"
      DB_USERNAME: sa
      DB_PASSWORD: "Local_Test1234!"
      # ── JWT ───────────────────────────────────────────────
      # 로컬 개발 전용 키 — 프로덕션에서 절대 사용 금지
      JWT_SECRET_KEY: "local-dev-only-key-minimum-32chars-ok"
      JWT_EXPIRATION: "86400"
      # ── JPA ───────────────────────────────────────────────
      DDL_AUTO: update
      # ── Admin 초기 계정 ───────────────────────────────────
      ADMIN_INITIAL_EMAIL: "admin@bit.com"
      ADMIN_INITIAL_PASSWORD: "Admin1234!"
      # ── CORS ──────────────────────────────────────────────
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v3/api-docs > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  mssql_data:
